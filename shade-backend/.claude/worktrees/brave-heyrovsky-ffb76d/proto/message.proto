syntax = "proto3";

option go_package = "./pb";

package pb;

enum MessageType {
  TEXT = 0;
  IMAGE = 1;
}

enum ReceiptStatus {
  DELIVERED = 0;
  READ = 1;
}

message EncryptedPayload {
  string message_id = 1;
  string sender_id = 2;
  string sender_shade_id = 3;
  string receiver_id = 4;

  bytes ciphertext = 5;
  bytes nonce = 6;
  bytes auth_tag = 7;

  int64 timestamp = 8;
  MessageType type = 9;
}

message DeliveryReceipt {
  string message_id = 1;
  string sender_id = 2;
  string sender_shade_id = 3;
  string receiver_id = 4;
  ReceiptStatus status = 5;
  int64 timestamp = 6;
}

message MessageAck {
  string message_id = 1;
}

message WebSocketMessage {
  oneof content {
    EncryptedPayload payload = 1;
    DeliveryReceipt receipt = 2;
    MessageAck ack = 3;
  }
}