run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - bodyclose
    - gocritic

issues:
  exclude-dirs:
    - tools
    - pb
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
